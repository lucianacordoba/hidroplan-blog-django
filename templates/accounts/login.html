{% extends "base.html" %}

{% block title %}Login - HidroPlan Blog{% endblock %}

{% block content %}
    <h1>Iniciar sesión</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Ingresar</button>
    </form>
    <p>¿No tenés cuenta? <a href="{% url 'accounts:signup' %}">Registrate acá</a>.</p>
{% endblock %}
