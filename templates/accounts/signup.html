{% extends "base.html" %}

{% block title %}Signup - HidroPlan Blog{% endblock %}

{% block content %}
    <h1>Crear cuenta</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Registrarme</button>
    </form>
    <p>¿Ya tenés cuenta? <a href="{% url 'accounts:login' %}">Iniciá sesión</a>.</p>
{% endblock %}
