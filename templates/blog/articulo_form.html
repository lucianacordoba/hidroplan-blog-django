{% extends "base.html" %}

{% block title %}{% if object %}Editar página{% else %}Crear página{% endif %} - HidroPlan Blog{% endblock %}

{% block content %}
    <h1>{% if object %}Editar página{% else %}Crear página{% endif %}</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.media }}
        {{ form.as_p }}
        <button class="btn" type="submit">Guardar</button>
    </form>
{% endblock %}
